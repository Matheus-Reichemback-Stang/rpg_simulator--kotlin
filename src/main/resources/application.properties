# 0. Definindo o nome da aplicação
spring.application.name=application

# 1. Configuração da URL de conexão com o banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/rpg-simulator

# 2. Usuário e Senha do seu PostgreSQL local
spring.datasource.username=postgres
spring.datasource.password=111222

# 3. Driver do PostgreSQL (o Spring costuma detectar sozinho, mas é bom fixar)
spring.datasource.data-class-name=org.postgresql.Driver

# 4. Configuração do Hibernate / JPA
# O "update" faz o Spring criar ou atualizar as tabelas do RPG automaticamente no banco de dados baseado no seu código Kotlin
spring.jpa.hibernate.ddl-auto=update

# Exibe no console do IntelliJ os comandos SQL reais que o Spring está executando
spring.jpa.show-sql=true